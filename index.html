<style>

body{
font-family:'Patrick Hand', cursive;
background:#efe7da;
background-image:url("https://www.transparenttextures.com/patterns/paper.png");
overflow-x:hidden;
}

/* main card */

.main-card{
background:#fff1e6;
border:3px solid #ddb892;
box-shadow:8px 8px 0px #b08968;
position:relative;
}

/* tape */

.tape{
position:absolute;
width:120px;
height:25px;
background:#fbc4ab;
top:-12px;
left:40%;
opacity:0.7;
transform:rotate(-3deg);
}

/* kas box */

.box{
background:#fefae0;
border:2px dashed #dda15e;
box-shadow:3px 3px 0px #e9edc9;
}

/* button */

.btn{
background:#bc6c25;
color:white;
transition:0.2s;
}

.btn:hover{
background:#99582a;
transform:scale(1.03);
}

/* table */

thead{
background:#faedcd;
}

/* doodle elements */

.doodle{
position:fixed;
opacity:0.7;
}

.star{font-size:28px;}
.spark{font-size:24px;}
.tv{font-size:40px;}
.clock{font-size:40px;}
.scribble{font-size:35px;}

/* positions */

.s1{top:60px;right:70px;}
.s2{top:120px;right:140px;}
.s3{bottom:90px;left:90px;}
.s4{bottom:40px;right:140px;}

.tv1{bottom:40px;right:40px;}
.clock1{top:40px;left:40px;}

.scr1{bottom:120px;left:30px;}
.scr2{top:250px;right:20px;}

.title{
font-size:40px;
letter-spacing:2px;
}

</style>

<body class="p-6">

<!-- doodles -->

<div class="doodle star s1">✦</div>
<div class="doodle star s2">☆</div>
<div class="doodle spark s3">✧</div>
<div class="doodle spark s4">✦</div>

<div class="doodle tv tv1">📺</div>
<div class="doodle clock clock1">🕒</div>

<div class="doodle scribble scr1">〰️</div>
<div class="doodle scribble scr2">➰</div>

<div class="max-w-2xl mx-auto p-8 rounded-xl main-card">

<div class="tape"></div>

<h1 class="text-center mb-8 title">💰 UKW Management</h1>

<!-- summary -->

<div class="grid grid-cols-3 gap-4 text-center mb-8">

<div class="p-4 rounded-lg box">
<p>Total Income</p>
<p id="totalIn" class="text-green-700">Rp 100.000</p>
</div>

<div class="p-4 rounded-lg box">
<p>Total Expense</p>
<p id="totalOut" class="text-red-700">Rp 50.000</p>
</div>

<div class="p-4 rounded-lg box">
<p>Balance</p>
<p id="balance" class="text-gray-800">Rp 50.000</p>
</div>

</div>

<!-- input -->

<div class="space-y-3 mb-6">

<input id="desc" placeholder="Description" class="w-full p-2 border rounded">

<input id="amount" type="number" placeholder="Amount (Rp)" class="w-full p-2 border rounded">

<select id="type" class="w-full p-2 border rounded">
<option value="in">Money In</option>
<option value="out">Money Out</option>
</select>

<button onclick="addTransaction()" class="w-full p-2 rounded btn">
Add Transaction
</button>

</div>

<h2 class="text-lg mb-3">Transaction History</h2>

<table class="w-full text-sm">

<thead>
<tr>
<th class="p-2">Description</th>
<th class="p-2 text-right">Amount</th>
<th class="p-2 text-center">Delete</th>
</tr>
</thead>

<tbody id="historyBody"><tr>

<td class="p-2">uang kas 1</td>

<td class="p-2 text-right text-green-600">
+ Rp 100.000
</td>

<td class="text-center">
<button onclick="deleteItem(0)">❌</button>
</td>

</tr><tr>

<td class="p-2">beli ganja</td>

<td class="p-2 text-right text-red-600">
- Rp 50.000
</td>

<td class="text-center">
<button onclick="deleteItem(1)">❌</button>
</td>

</tr></tbody>

</table>

</div>

<script>

let transactions = JSON.parse(localStorage.getItem('kas_data')) || [];

function formatRupiah(num){
return "Rp " + Number(num).toLocaleString('id-ID');
}

function updateUI(){

const historyBody=document.getElementById('historyBody');
historyBody.innerHTML='';

let totalIn=0;
let totalOut=0;

transactions.forEach((t,index)=>{

const row=document.createElement('tr');

const color=t.type==='in'?'green':'red';
const prefix=t.type==='in'?'+':'-';

row.innerHTML=`

<td class="p-2">${t.desc}</td>

<td class="p-2 text-right text-${color}-600">
${prefix} ${formatRupiah(t.amount)}
</td>

<td class="text-center">
<button onclick="deleteItem(${index})">❌</button>
</td>

`;

historyBody.appendChild(row);

if(t.type==='in') totalIn+=Number(t.amount);
else totalOut+=Number(t.amount);

});

document.getElementById('totalIn').innerText=formatRupiah(totalIn);
document.getElementById('totalOut').innerText=formatRupiah(totalOut);
document.getElementById('balance').innerText=formatRupiah(totalIn-totalOut);

localStorage.setItem('kas_data',JSON.stringify(transactions));

}

function addTransaction(){

const desc=document.getElementById('desc').value;
const amount=document.getElementById('amount').value;
const type=document.getElementById('type').value;

if(!desc||!amount) return alert("Please fill all fields");

transactions.push({desc,amount,type});

updateUI();

document.getElementById('desc').value='';
document.getElementById('amount').value='';

}

function deleteItem(index){

if(confirm("Delete this transaction?")){
transactions.splice(index,1);
updateUI();
}

}

updateUI();

</script>
